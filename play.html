<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Волшебный Хомячок</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="black-line" aria-hidden="true"></div>

      <h1 class="title" data-i18n="welcome">Добро Пожаловать</h1>
      <p class="subtitle" data-i18n="welcomeSub">в Волшебный Хомячок!</p>
    </main>

    <div class="floating-logo" aria-label="Летающий логотип">
      <img src="main_hamster.jpg" alt="Логотип" />
    </div>

    <div class="spin-counter"><span data-i18n="spins">вращения</span>: <span id="spin-count">0</span></div>

    <div class="speed-slider">
      <label for="speed-range" data-i18n="speed">Скорость</label>
      <input type="range" id="speed-range" min="1" max="100" value="50" />
    </div>

    <a href="worlds.html" class="btn-exit" id="btn-exit" data-i18n="saveAndExit">Сохранить и выйти</a>

    <script src="lang.js"></script>
    <script src="script.js"></script>
    <script>I18N.applyToPage();</script>
  </body>
</html>
