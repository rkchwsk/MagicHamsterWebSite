<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Волшебный Хомячок</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="black-line" aria-hidden="true"></div>

      <h1 class="title">Добро Пожаловать</h1>
      <p class="subtitle">в Волшебный Хомячок!</p>
    </main>

    <div class="floating-logo" aria-label="Летающий логотип">
      <img src="main_hamster.jpg" alt="Логотип компании Волшебный Хомячок" />
    </div>

    <div class="spin-counter">вращения: <span id="spin-count">0</span></div>

    <div class="speed-slider">
      <label for="speed-range">Скорость</label>
      <input type="range" id="speed-range" min="1" max="100" value="50" />
    </div>

    <script src="script.js"></script>
  </body>
</html>
